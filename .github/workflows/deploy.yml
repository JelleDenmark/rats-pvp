name: Deploy to GitHub Pages

# Rats PvP fork: single-branch deploy (master → prod at site root). The upstream
# WRAD workflow built two channels (master=prod at /, dev at /dev/); this fork
# has no dev branch, so we keep it simple. Vite's base is './' (relative asset
# paths) so it works under the project-site subpath with no repo-name hardcoding.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build
        env:
          VITE_CHANNEL: prod
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
